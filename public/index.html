<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/message-text.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Platform</title>
  <script>
    (function () {
      var l = window.location;

      if (l.search[1] === "p") {
        var decoded = l.search.slice(3).split("&")[0];

        window.history.replaceState(
          null,
          null,
          l.pathname + decoded + l.hash
        );
      }
    })();
  </script>
</head>

<body style="margin: 0; padding: 0%; box-sizing: border-box;">
  <div id="root"></div>
</body>

</html>
